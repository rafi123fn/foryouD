<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untukmu</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
overflow:hidden;
background:radial-gradient(circle at 70% 30%, rgba(255,105,180,0.15), transparent 40%),
           radial-gradient(circle at 20% 80%, rgba(255,105,180,0.1), transparent 40%),
           #020617;
color:#fff;
}

/* CANVAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* SCENE */
#scene{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2;
transition:2s;
}

/* ENVELOPE */
.envelope{
width:230px;
height:150px;
background:#fff;
border-radius:8px;
position:relative;
transform:scale(0);
animation:zoomIn 1.8s ease forwards;
box-shadow:0 30px 60px rgba(0,0,0,0.8);
}

.envelope::before{
content:'';
position:absolute;
top:0;
left:0;
border-left:115px solid transparent;
border-right:115px solid transparent;
border-top:75px solid #ddd;
transform-origin:top;
transition:1s;
}

.envelope.open::before{
transform:rotateX(180deg);
}

/* BUTTON */
#openBtn{
margin-top:25px;
opacity:0;
padding:10px 25px;
border-radius:30px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(8px);
transition:2s;
cursor:pointer;
letter-spacing:2px;
}

.showBtn{opacity:1 !important;}

/* LETTER */
#letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,150%) scale(0.9);
width:92%;
max-width:700px;
height:78%;
background:#fff;
color:#000;
padding:25px;
border-radius:12px;
opacity:0;
transition:2.5s;
overflow-y:auto;
z-index:3;
}

#letter.show{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

h1{
text-align:center;
margin-bottom:20px;
letter-spacing:2px;
}

p{
margin-bottom:20px;
line-height:1.9;
min-height:30px;
}

/* IMAGE */
#img{
text-align:center;
opacity:0;
transition:3s;
}

#img.show{opacity:1;}

#img img{
width:70%;
max-width:260px;
}

/* AUDIO */
#audioBtn{
position:fixed;
bottom:15px;
right:15px;
background:rgba(255,255,255,0.1);
padding:8px 15px;
border-radius:20px;
font-size:12px;
cursor:pointer;
z-index:5;
}

/* ANIM */
@keyframes zoomIn{
0%{transform:scale(0);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="scene">
<div class="envelope" id="env"></div>
<div id="openBtn">OPEN</div>
</div>

<div id="letter">
<h1>UNTUKMU</h1>

<p id="p1"></p>
<p id="p2"></p>
<p id="p3"></p>
<p id="p4"></p>

<div id="img">
<img src="https://i.imgur.com/8Km9tLL.png">
</div>
</div>

<audio id="music" loop>
<source src="nina.mp3" type="audio/mpeg">
</audio>

<audio id="type">
<source src="https://www.soundjay.com/keyboard/keyboard-1.mp3">
</audio>

<audio id="ambience">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c9b9c6c59.mp3">
</audio>

<div id="audioBtn">Music</div>

<script>

/* ===== STAR + SHOOTING STAR SYSTEM ===== */
const c=document.getElementById("stars");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let stars=[];
let shootingStars=[];

/* NORMAL STARS */
for(let i=0;i<150;i++){
stars.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*1.5+0.5,
d:Math.random()*0.3+0.1
});
}

/* SHOOTING STAR */
function createShootingStar(){
shootingStars.push({
x:Math.random()*c.width,
y:0,
len:Math.random()*80+50,
speed:Math.random()*6+4,
opacity:1
});
}

setInterval(createShootingStar,3000);

function draw(){
ctx.clearRect(0,0,c.width,c.height);

/* stars */
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});

/* move stars */
stars.forEach(s=>{
s.y+=s.d;
if(s.y>c.height){
s.y=0;
s.x=Math.random()*c.width;
}
});

/* shooting stars */
shootingStars.forEach((s,i)=>{
ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x+s.len, s.y+s.len);
ctx.strokeStyle="rgba(255,255,255,"+s.opacity+")";
ctx.lineWidth=2;
ctx.stroke();

s.x+=s.speed;
s.y+=s.speed;
s.opacity-=0.02;

if(s.opacity<=0){
shootingStars.splice(i,1);
}
});

}

setInterval(draw,30);

/* ELEMENT */
const env=document.getElementById("env");
const btn=document.getElementById("openBtn");
const scene=document.getElementById("scene");
const letter=document.getElementById("letter");
const music=document.getElementById("music");
const type=document.getElementById("type");
const amb=document.getElementById("ambience");

setTimeout(()=>btn.classList.add("showBtn"),1500);

btn.onclick=()=>{
env.classList.add("open");

setTimeout(()=>scene.style.opacity="0",800);

setTimeout(()=>{
scene.style.display="none";
letter.classList.add("show");
music.play();
amb.volume=0.3;
amb.play();
start();
},2200);
};

/* TEXT */
const text=[
"Halo Deandra, semoga Allah selalu memberikan kamu kesehatan dan kekuatan dalam setiap langkah yang kamu jalani. Aku tahu… tidak semua perjalanan hidup terasa mudah, ada saat dimana semuanya terasa berat dan membuatmu merasa tertinggal.",

"Kamu pernah berada di titik terbaikmu, lalu perlahan semuanya berubah. Tempat baru tidak selalu membawa kebahagiaan, justru meninggalkan luka yang diam-diam menetap di dalam dirimu.",

"Tapi kamu harus tahu… kamu tidak pernah benar-benar kehilangan dirimu. Kamu hanya sedang melewati fase yang sulit, dan itu bukan akhir dari perjalananmu.",

"Jadi jangan menyerah… tetaplah berjalan, walaupun pelan. Karena suatu hari nanti, kamu akan melihat ke belakang dan menyadari… kamu sudah sejauh ini, dan kamu berhasil melewati semuanya."
];

const el=[p1,p2,p3,p4];
let speed=38;

function typeText(t,e,cb){
let i=0;
function ngetik(){
if(i<t.length){
e.innerHTML+=t[i];
type.currentTime=0;
type.volume=0.2;
type.play();
i++;
setTimeout(ngetik,speed);
}else{
if(cb)setTimeout(cb,1000);
}
}
ngetik();
}

function start(){
typeText(text[0],el[0],()=>{
typeText(text[1],el[1],()=>{
typeText(text[2],el[2],()=>{
typeText(text[3],el[3],()=>{
document.getElementById("img").classList.add("show");
});
});
});
});
}

/* MUSIC */
document.getElementById("audioBtn").onclick=()=>{
if(music.paused){music.play();amb.play();}
else{music.pause();amb.pause();}
};

</script>

</body>
</html>
